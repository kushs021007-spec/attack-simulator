<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.card{
background:#1e293b;
padding:40px;
border-radius:10px;
width:350px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#22c55e;
border:none;
padding:10px;
width:100%;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Employee Login</h2>

<input placeholder="Employee Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>

</html>
